<app-home-page-header></app-home-page-header>
<main>
  <div class="form-container">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="search-form" style="width: 100%">
      <h2>Crear Receta Personalizada</h2>

      <input type="text" formControlName="title" placeholder="Título de la receta..." />

      <textarea
        formControlName="ingredients"
        placeholder="Ingredientes (uno por línea)..."
        rows="5"
        style="
          width: 100%;
          max-width: 500px;
          padding: 14px;
          border-radius: 8px;
          font-family: inherit;
        "
      ></textarea>

      <textarea
        formControlName="instructions"
        placeholder="Instrucciones paso a paso..."
        rows="6"
        style="
          width: 100%;
          max-width: 500px;
          padding: 14px;
          border-radius: 8px;
          font-family: inherit;
        "
      ></textarea>

      <select
        formControlName="listId"
        style="width: 100%; max-width: 500px; padding: 14px; border-radius: 8px"
      >
        <option value="0" disabled selected>Guardar en la lista...</option>
        @for (list of commonUser.recipeLists; track list.id) {
          <option [value]="list.id">{{ list.name }}</option>
        }
      </select>

      <button type="submit" class="button" [disabled]="form.invalid">Crear y Guardar</button>
    </form>
  </div>
</main>
<footer></footer>
